<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: headerelement('FootballHub - Player details')}">
    <title>FootballHub - Player details</title>
</head>
<body>

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-5" th:if="${player}">
    <div class="d-flex justify-content-between mb-3">
        <a th:href="@{/playerdetails/{id}(id=${prevId})}" class="btn btn-outline-secondary">
            ← Vorige
        </a>

        <a th:href="@{/playerdetails/{id}(id=${nextId})}" class="btn btn-outline-secondary">
            Volgende →
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="row g-0">
            <div class="col-md-4">
                <img th:src="${player.imageUrl}"
                     th:alt="${player.name}"
                     class="img-fluid rounded-start h-100 object-fit-cover">
            </div>

            <div class="col-md-8">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-start mb-4">
                        <h1 class="card-title mb-0" th:text="${player.name}">Speler naam</h1>

                        <a th:href="@{/playeredit/{id}(id=${player.id})}" class="btn btn-sm btn-warning">
                            Bewerken
                        </a>
                    </div>

                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">
                            <strong>Positie:</strong>
                            <span th:text="${player.position}">Positie</span>
                        </li>
                        <li class="list-group-item">
                            <strong>Leeftijd:</strong>
                            <span th:text="${player.age}">30</span>
                        </li>
                        <li class="list-group-item">
                            <strong>Nationaliteit:</strong>
                            <span th:text="${player.nationality}">België</span>
                        </li>
                        <li class="list-group-item" th:if="${player.club}">
                            <strong>Club:</strong>
                            <a th:href="@{/clubdetails/{id}(id=${player.club.id})}"
                               th:text="${player.club.name}">
                                Club naam
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</main>

<main class="container py-5" th:unless="${player}">
    <div class="alert alert-warning mb-0">
        Geen geldige speler gekozen.
    </div>
</main>

<footer th:replace="~{fragments/footer :: standardfooter}"></footer>

</body>
</html>
