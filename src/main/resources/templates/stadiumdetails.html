<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: headerelement('FootballHub - Stadium details')}">
  <title>FootballHub - Stadium details</title>
</head>
<body>

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-5" th:if="${stadium}">
  <div class="d-flex justify-content-between mb-3">
    <a th:href="@{/stadiumdetails/{id}(id=${prevId})}" class="btn btn-outline-secondary">
      ← Vorige
    </a>

    <a th:href="@{/stadiumdetails/{id}(id=${nextId})}" class="btn btn-outline-secondary">
      Volgende →
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="row g-0">
      <div class="col-md-4">
        <img th:src="${stadium.imageUrl}"
             th:alt="${stadium.name}"
             class="img-fluid rounded-start h-100 object-fit-cover">
      </div>

      <div class="col-md-8">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-start mb-4">
            <h1 class="card-title mb-0" th:text="${stadium.name}">Stadium naam</h1>

            <div class="d-flex gap-2" sec:authorize="hasRole('ADMIN')">
              <a th:href="@{/stadiumedit/{id}(id=${stadium.id})}" class="btn btn-sm btn-warning">
                Bewerken
              </a>

              <form method="post"
                    th:action="@{/stadiumdelete/{id}(id=${stadium.id})}"
                    class="d-inline">
                <button type="submit" class="btn btn-sm btn-danger">
                  Verwijderen
                </button>
              </form>
            </div>
          </div>

          <ul class="list-group list-group-flush mb-4">
            <li class="list-group-item">
              <strong>Stad:</strong>
              <span th:text="${stadium.city}">Stad</span>
            </li>
            <li class="list-group-item">
              <strong>Capaciteit:</strong>
              <span th:text="${stadium.capacity}">10000</span>
            </li>
            <li class="list-group-item">
              <strong>Prijs per uur:</strong>
              <span th:text="${stadium.pricePerHour + ' €'}">250 €</span>
            </li>
          </ul>

          <div class="card bg-light border-0 mb-4">
            <div class="card-body">
              <h2 class="h5 mb-2">Beschrijving</h2>
              <p class="mb-0" th:text="${stadium.description}">
                Beschrijving
              </p>
            </div>
          </div>

          <div sec:authorize="isAuthenticated()">
            <a th:href="@{/reservationcreate(stadiumId=${stadium.id})}" class="btn btn-primary">
              Reserveer dit stadium
            </a>
          </div>

          <div sec:authorize="isAnonymous()">
            <a th:href="@{/login}" class="btn btn-outline-primary">
              Log in om te reserveren
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<main class="container py-5" th:unless="${stadium}">
  <div class="alert alert-warning mb-0">
    Geen geldig stadium gekozen.
  </div>
</main>

<footer th:replace="~{fragments/footer :: standardfooter}"></footer>

</body>
</html>
