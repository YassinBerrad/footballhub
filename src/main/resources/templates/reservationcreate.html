<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: headerelement('FootballHub - Stadium reserveren')}">
    <title>FootballHub - Stadium reserveren</title>
</head>
<body>

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-5">
    <h1 class="mb-4">Stadium reserveren</h1>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form method="post" th:action="@{/reservationcreate}">

                <div class="mb-3">
                    <label class="form-label">Gebruiker</label>
                    <input type="text" class="form-control" th:value="${currentUsername}" readonly>
                </div>

                <div class="mb-3">
                    <label for="stadiumId" class="form-label">Stadium</label>
                    <select id="stadiumId" name="stadiumId" class="form-select">
                        <option value="">Kies een stadium</option>
                        <option th:each="stadium : ${stadiums}"
                                th:value="${stadium.id}"
                                th:text="${stadium.name + ' (' + stadium.city + ') - ' + stadium.pricePerHour + ' €/uur'}"
                                th:selected="${selectedStadiumId != null and selectedStadiumId == stadium.id}">
                            Stadium
                        </option>
                    </select>
                    <div class="text-danger small mt-1" th:if="${stadiumError}" th:text="${stadiumError}">
                        Stadium fout
                    </div>
                </div>

                <div class="mb-3">
                    <label for="reservationDate" class="form-label">Datum</label>
                    <input type="date" id="reservationDate" name="reservationDate" class="form-control" th:value="${reservationDate}">
                    <div class="text-danger small mt-1" th:if="${reservationDateError}" th:text="${reservationDateError}">
                        Datum fout
                    </div>
                </div>

                <div class="mb-3">
                    <label for="startHour" class="form-label">Startuur</label>
                    <input type="number" id="startHour" name="startHour" class="form-control" th:value="${startHour}">
                    <div class="form-text">Toegelaten tussen 8 en 22 uur.</div>
                    <div class="text-danger small mt-1" th:if="${startHourError}" th:text="${startHourError}">
                        Startuur fout
                    </div>
                </div>

                <div class="mb-4">
                    <label for="durationHours" class="form-label">Duur (uren)</label>
                    <input type="number" id="durationHours" name="durationHours" class="form-control" th:value="${durationHours}">
                    <div class="form-text">Minimum 1 uur, maximum 8 uur.</div>
                    <div class="text-danger small mt-1" th:if="${durationHoursError}" th:text="${durationHoursError}">
                        Duur fout
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        Reservatie opslaan
                    </button>

                    <a th:href="@{/stadiumlist}" class="btn btn-outline-secondary">
                        Annuleren
                    </a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: standardfooter}"></footer>

</body>
</html>
