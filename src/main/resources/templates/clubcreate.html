<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: headerelement(${isEdit} ? 'FootballHub - Club bewerken' : 'FootballHub - Nieuwe club')}">
    <title>FootballHub - Club formulier</title>
</head>
<body>

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-5">
    <h1 class="mb-4" th:text="${isEdit} ? 'Club bewerken' : 'Nieuwe club toevoegen'">
        Club formulier
    </h1>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form method="post"
                  th:action="${isEdit} ? @{/clubedit} : @{/clubcreate}"
                  th:object="${club}"
                  enctype="multipart/form-data">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label for="name" class="form-label">Naam</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                        Naam fout
                    </div>
                </div>

                <div class="mb-3">
                    <label for="city" class="form-label">Stad</label>
                    <input type="text" id="city" th:field="*{city}" class="form-control">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('city')}" th:errors="*{city}">
                        Stad fout
                    </div>
                </div>

                <div class="mb-3">
                    <label for="stadium" class="form-label">Stadion</label>
                    <input type="text" id="stadium" th:field="*{stadium}" class="form-control">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('stadium')}" th:errors="*{stadium}">
                        Stadion fout
                    </div>
                </div>

                <div class="mb-3">
                    <label for="foundedYear" class="form-label">Oprichtingsjaar</label>
                    <input type="number" id="foundedYear" th:field="*{foundedYear}" class="form-control">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('foundedYear')}" th:errors="*{foundedYear}">
                        Oprichtingsjaar fout
                    </div>
                </div>

                <div class="mb-3" th:if="${isEdit and club.imageUrl != null}">
                    <label class="form-label">Huidige afbeelding</label>
                    <div>
                        <img th:src="${club.imageUrl}"
                             th:alt="${club.name}"
                             class="img-thumbnail"
                             style="max-width: 200px;">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="imageFile" class="form-label"
                           th:text="${isEdit} ? 'Nieuwe afbeelding uploaden (optioneel)' : 'Afbeelding uploaden'">
                        Afbeelding uploaden
                    </label>
                    <input type="file"
                           id="imageFile"
                           name="imageFile"
                           class="form-control"
                           accept=".jpg,.jpeg,.png,.webp,image/*">
                    <div class="form-text"
                         th:text="${isEdit} ? 'Laat leeg om de huidige afbeelding te behouden.' : 'Toegestaan: JPG, JPEG, PNG of WEBP'">
                        Toegestaan: JPG, JPEG, PNG of WEBP
                    </div>
                    <div class="text-danger small mt-1" th:if="${imageError}" th:text="${imageError}">
                        Afbeelding fout
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit"
                            class="btn btn-primary"
                            th:text="${isEdit} ? 'Club bijwerken' : 'Club opslaan'">
                        Opslaan
                    </button>

                    <a th:href="@{/clublist}" class="btn btn-outline-secondary">
                        Annuleren
                    </a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: standardfooter}"></footer>

</body>
</html>
