<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: headerelement(${isEdit} ? 'FootballHub - Stadium bewerken' : 'FootballHub - Nieuw stadium')}">
  <title>FootballHub - Stadium formulier</title>
</head>
<body>

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-5">
  <h1 class="mb-4" th:text="${isEdit} ? 'Stadium bewerken' : 'Nieuw stadium toevoegen'">
    Stadium formulier
  </h1>

  <div class="card shadow-sm">
    <div class="card-body p-4">
      <form method="post"
            th:action="${isEdit} ? @{/stadiumedit} : @{/stadiumcreate}"
            th:object="${stadium}"
            enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
          <label for="name" class="form-label">Naam</label>
          <input type="text" id="name" th:field="*{name}" class="form-control">
          <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
            Naam fout
          </div>
        </div>

        <div class="mb-3">
          <label for="city" class="form-label">Stad</label>
          <input type="text" id="city" th:field="*{city}" class="form-control">
          <div class="text-danger small mt-1" th:if="${#fields.hasErrors('city')}" th:errors="*{city}">
            Stad fout
          </div>
        </div>

        <div class="mb-3">
          <label for="capacity" class="form-label">Capaciteit</label>
          <input type="number" id="capacity" th:field="*{capacity}" class="form-control">
          <div class="text-danger small mt-1" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}">
            Capaciteit fout
          </div>
        </div>

        <div class="mb-3">
          <label for="pricePerHour" class="form-label">Prijs per uur (€)</label>
          <input type="number" id="pricePerHour" th:field="*{pricePerHour}" class="form-control">
          <div class="text-danger small mt-1" th:if="${#fields.hasErrors('pricePerHour')}" th:errors="*{pricePerHour}">
            Prijs fout
          </div>
        </div>

        <div class="mb-3">
          <label for="description" class="form-label">Beschrijving</label>
          <textarea id="description" th:field="*{description}" class="form-control" rows="4"></textarea>
          <div class="text-danger small mt-1" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">
            Beschrijving fout
          </div>
        </div>

        <div class="mb-3" th:if="${isEdit and stadium.imageUrl != null}">
          <label class="form-label">Huidige afbeelding</label>
          <div>
            <img th:src="${stadium.imageUrl}"
                 th:alt="${stadium.name}"
                 class="img-thumbnail"
                 style="max-width: 200px;">
          </div>
        </div>

        <div class="mb-4">
          <label for="imageFile" class="form-label"
                 th:text="${isEdit} ? 'Nieuwe afbeelding uploaden (optioneel)' : 'Afbeelding uploaden'">
            Afbeelding uploaden
          </label>
          <input type="file" id="imageFile" name="imageFile" class="form-control" accept=".jpg,.jpeg,.png,.webp,image/*">
          <div class="form-text" th:text="${isEdit} ? 'Laat leeg om de huidige afbeelding te behouden.' : 'Toegestaan: JPG, JPEG, PNG of WEBP'">
            Toegestaan: JPG, JPEG, PNG of WEBP
          </div>
          <div class="text-danger small mt-1" th:if="${imageError}" th:text="${imageError}">
            Afbeelding fout
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit"
                  class="btn btn-primary"
                  th:text="${isEdit} ? 'Stadium bijwerken' : 'Stadium opslaan'">
            Opslaan
          </button>

          <a th:href="@{/stadiumlist}" class="btn btn-outline-secondary">
            Annuleren
          </a>
        </div>
      </form>
    </div>
  </div>
</main>

<footer th:replace="~{fragments/footer :: standardfooter}"></footer>

</body>
</html>
