<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">FootballHub</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a th:href="@{/home}"
             th:class="${currentUrl == '/' or currentUrl == '/home'} ? 'nav-link active' : 'nav-link'">
            Home
          </a>
        </li>
        <li class="nav-item">
          <a th:href="@{/about}"
             th:class="${currentUrl == '/about'} ? 'nav-link active' : 'nav-link'">
            Over mij
          </a>
        </li>
        <li class="nav-item">
          <a th:href="@{/clublist}"
             th:class="${currentUrl == '/clublist' or currentUrl.startsWith('/clubdetails') ? 'nav-link active' : 'nav-link'}">
            Clubs
          </a>
        </li>
        <li class="nav-item">
          <a th:href="@{/playerlist}"
             th:class="${currentUrl == '/playerlist' or currentUrl.startsWith('/playerdetails') ? 'nav-link active' : 'nav-link'}">
            Spelers
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/playercreate}">Nieuwe speler</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/clubcreate}">Nieuwe club</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

</body>
</html>
