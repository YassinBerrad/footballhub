<!DOCTYPE html>
<html lang="nl"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:fragment="navbar">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">FootballHub</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
            aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/}">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" th:href="@{/about}">About</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" th:href="@{/clublist}">Clubs</a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" th:href="@{/clubcreate}">Nieuwe club</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" th:href="@{/playerlist}">Spelers</a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" th:href="@{/playercreate}">Nieuwe speler</a>
        </li>
      </ul>

      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item" sec:authorize="isAnonymous()">
          <a class="nav-link" th:href="@{/login}">Login</a>
        </li>

        <li class="nav-item" sec:authorize="isAuthenticated()">
          <form method="post" th:action="@{/logout}" class="d-inline">
            <button type="submit" class="nav-link btn btn-link p-0 border-0 text-decoration-none">
              Logout
            </button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</nav>

</body>
</html>
