<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: headerelement('FootballHub - Stadiums')}">
    <title>FootballHub - Stadiums</title>
</head>
<body>

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main>
    <section class="page-hero-small bg-dark text-white position-relative overflow-hidden">
        <div class="position-absolute top-0 start-0 w-100 h-100 opacity-25"
             style="background: radial-gradient(circle at top right, #ffc107 0%, transparent 35%), radial-gradient(circle at bottom left, #198754 0%, transparent 35%);"></div>

        <div class="container py-5 position-relative">
            <div class="text-center py-4">
                <span class="badge bg-warning-subtle text-warning-emphasis px-3 py-2 rounded-pill mb-3">🏟️ Stadiums</span>
                <h1 class="display-5 fw-bold">Ontdek alle stadiums</h1>
                <p class="lead text-white-50 mb-0">Bekijk capaciteit, prijs en stadioninformatie in één overzicht.</p>
            </div>
        </div>
    </section>

    <section class="py-5 bg-light">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
                <h2 class="fw-bold mb-0">Stadium overzicht</h2>

                <a th:href="@{/stadiumcreate}" class="btn btn-success rounded-pill px-4" sec:authorize="hasRole('ADMIN')">
                    + Nieuw stadium
                </a>
            </div>

            <div class="row g-4" th:if="${stadiums != null and !#lists.isEmpty(stadiums)}">
                <div class="col-md-6 col-lg-4" th:each="stadium : ${stadiums}">
                    <a th:href="@{/stadiumdetails/{id}(id=${stadium.id})}"
                       class="text-decoration-none text-dark">
                        <div class="card football-card h-100 border-0 shadow-sm rounded-4 overflow-hidden">
                            <img th:if="${stadium.imageUrl != null and !#strings.isEmpty(stadium.imageUrl)}"
                                 th:src="@{${stadium.imageUrl}}"
                                 alt="Stadium afbeelding"
                                 class="w-100 football-card-image">

                            <div class="card-body p-4">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <div>
                                        <span class="badge bg-warning-subtle text-warning-emphasis mb-2">Stadium</span>
                                        <h4 class="fw-bold mb-1" th:text="${stadium.name}">Stadium naam</h4>
                                        <p class="text-muted mb-0" th:text="${stadium.city}">Stad</p>
                                    </div>
                                    <div class="fs-2">🏟️</div>
                                </div>

                                <div class="football-info-box p-3 rounded-4 bg-light mb-3">
                                    <p class="mb-2">
                                        <strong>Capaciteit:</strong>
                                        <span th:text="${stadium.capacity}">25000</span>
                                    </p>
                                    <p class="mb-2">
                                        <strong>Prijs:</strong>
                                        <span th:text="${stadium.pricePerHour + ' €/uur'}">150 €/uur</span>
                                    </p>
                                    <p class="mb-0 text-truncate">
                                        <strong>Beschrijving:</strong>
                                        <span th:text="${stadium.description}">Beschrijving</span>
                                    </p>
                                </div>

                                <div class="small text-muted">
                                    Klik om details te bekijken
                                </div>
                            </div>
                        </div>
                    </a>
                </div>
            </div>

            <div class="alert alert-warning rounded-4 border-0 shadow-sm mb-0"
                 th:if="${stadiums == null or #lists.isEmpty(stadiums)}">
                Geen stadiums gevonden.
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/footer :: standardfooter}"></footer>

</body>
</html>
