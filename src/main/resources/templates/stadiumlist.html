<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: headerelement('FootballHub - Stadiums')}">
    <title>FootballHub - Stadiums</title>
</head>
<body>

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-5">
    <h1 class="mb-4">Stadiums</h1>

    <div class="list-group" th:if="${stadiums != null and !#lists.isEmpty(stadiums)}">
        <a th:each="stadium : ${stadiums}"
           th:href="@{/stadiumdetails/{id}(id=${stadium.id})}"
           class="list-group-item list-group-item-action">
            <span th:text="${stadium.name}">Stadium naam</span>
            <span class="text-muted"> - </span>
            <span class="text-muted" th:text="${stadium.city}">Stad</span>
            <span class="text-muted"> - </span>
            <span class="text-muted" th:text="${stadium.pricePerHour + ' €/uur'}">Prijs</span>
        </a>
    </div>

    <div class="alert alert-warning mb-0" th:if="${stadiums == null or #lists.isEmpty(stadiums)}">
        Geen stadiums gevonden.
    </div>
</main>

<footer th:replace="~{fragments/footer :: standardfooter}"></footer>

</body>
</html>
