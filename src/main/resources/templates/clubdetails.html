<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: headerelement('FootballHub - Club details')}">
    <title>FootballHub - Club details</title>
</head>
<body>

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-5" th:if="${club}">
    <div class="d-flex justify-content-between mb-3">
        <a th:href="@{/clubdetails/{id}(id=${prevId})}" class="btn btn-outline-secondary">
            ← Vorige
        </a>

        <a th:href="@{/clubdetails/{id}(id=${nextId})}" class="btn btn-outline-secondary">
            Volgende →
        </a>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="row g-0">
            <div class="col-md-4">
                <img th:src="${club.imageUrl}"
                     th:alt="${club.name}"
                     class="img-fluid rounded-start h-100 object-fit-cover">
            </div>

            <div class="col-md-8">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-start mb-4">
                        <h1 class="card-title mb-0" th:text="${club.name}">Club naam</h1>

                        <div class="d-flex gap-2">
                            <a th:href="@{/clubedit/{id}(id=${club.id})}" class="btn btn-sm btn-warning">
                                Bewerken
                            </a>

                            <form method="post"
                                  th:action="@{/clubdelete/{id}(id=${club.id})}"
                                  class="d-inline">
                                <button type="submit" class="btn btn-sm btn-danger">
                                    Verwijderen
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="alert alert-danger mb-4" th:if="${deleteError}" th:text="${deleteError}">
                        Delete foutmelding
                    </div>

                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">
                            <strong>Stad:</strong>
                            <span th:text="${club.city}">Stad</span>
                        </li>
                        <li class="list-group-item">
                            <strong>Stadion:</strong>
                            <span th:text="${club.stadium}">Stadion</span>
                        </li>
                        <li class="list-group-item">
                            <strong>Oprichtingsjaar:</strong>
                            <span th:text="${club.foundedYear}">1900</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h2 class="h4 mb-3">Spelers van deze club</h2>

            <div class="list-group" th:if="${club.players != null and !#lists.isEmpty(club.players)}">
                <a th:each="player : ${club.players}"
                   th:href="@{/playerdetails/{id}(id=${player.id})}"
                   class="list-group-item list-group-item-action">
                    <span th:text="${player.name}">Speler naam</span>
                    <span class="text-muted"> - </span>
                    <span th:text="${player.position}" class="text-muted">Positie</span>
                </a>
            </div>

            <div class="alert alert-info mb-0" th:if="${club.players == null or #lists.isEmpty(club.players)}">
                Deze club heeft momenteel nog geen spelers.
            </div>
        </div>
    </div>
</main>

<main class="container py-5" th:unless="${club}">
    <div class="alert alert-warning mb-0">
        Geen geldige club gekozen.
    </div>
</main>

<footer th:replace="~{fragments/footer :: standardfooter}"></footer>

</body>
</html>
