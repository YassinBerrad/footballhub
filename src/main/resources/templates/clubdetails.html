<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: headerelement('FootballHub - Club details')}">
    <title>FootballHub - Club details</title>
</head>
<body>

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-5" th:if="${club}">
    <div class="d-flex justify-content-between mb-3">
        <a th:href="@{/clubdetails/{id}(id=${prevId})}" class="btn btn-outline-secondary">
            ← Vorige
        </a>

        <a th:href="@{/clubdetails/{id}(id=${nextId})}" class="btn btn-outline-secondary">
            Volgende →
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="row g-0">
            <div class="col-md-4">
                <img th:src="${club.imageUrl}"
                     th:alt="${club.name}"
                     class="img-fluid rounded-start h-100 object-fit-cover">
            </div>

            <div class="col-md-8">
                <div class="card-body p-4">
                    <h1 class="card-title mb-4" th:text="${club.name}">Club naam</h1>

                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">
                            <strong>Stad:</strong>
                            <span th:text="${club.city}">Stad</span>
                        </li>
                        <li class="list-group-item">
                            <strong>Stadion:</strong>
                            <span th:text="${club.stadium}">Stadion</span>
                        </li>
                        <li class="list-group-item">
                            <strong>Opgericht in:</strong>
                            <span th:text="${club.foundedYear}">1900</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</main>

<main class="container py-5" th:unless="${club}">
    <div class="alert alert-warning mb-0">
        Geen geldige club gekozen.
    </div>
</main>

<footer th:replace="~{fragments/footer :: standardfooter}"></footer>

</body>
</html>
