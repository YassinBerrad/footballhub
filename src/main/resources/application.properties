spring.application.name=footballhub

spring.datasource.url=jdbc:h2:mem:football
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# lokaal mag H2 console aan staan
# op Render zet je dit via environment variable op false:
# SECURITY_H2_CONSOLE_NEEDED=false
security.h2-console-needed=true

server.error.whitelabel.enabled=false